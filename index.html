<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home - Classroom</title>
    <link rel="icon" href="https://classroom.novodo.co.uk/favicon.png" />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        background-color: black;
        overflow: hidden;
      }

      iframe {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border: none;
      }
    </style>
  </head>

  <body>
    <iframe
      id="gameIframe"
      sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-forms"
    ></iframe>

    <script>
      const url = prompt("Enter a URL to load:");

      if (url) {
        document.getElementById("gameIframe").src = url;
      }
    </script>
  </body>
</html>
